name: Build Kernel
on:
  workflow_dispatch:
    inputs:
      BRANCH:
        description: Kernel branch
        default: 'master'
        required: true
        
jobs:
  build:
    runs-on: ubuntu-22.04
    environment: build-kernel-${{ inputs.BRANCH }}
    steps:
    - name: Get date
      id: rundate
      run: sudo rm /etc/localtime && sudo ln -s /usr/share/zoneinfo/Asia/Jakarta /etc/localtime && echo "REPO_DATE=`date`" >> $GITHUB_OUTPUT
    
    - uses: actions/checkout@v4
      with:
        path: kernel_root
        repository: "rufnx/kernel_samsung_a226b"
        ref: ${{ inputs.BRANCH }}
        show-progress: false
        fetch-depth: 1
        
    - name: Prepare dependencies
      run: |
        sudo apt update -y
        sudo apt install bc cpio flex bison aptitude git python-is-python3 tar perl wget aria2 curl lz4 -y
        sudo aptitude install libssl-dev -y
        
    - name: Build Kernel
      run: |
        chmod +x *.sh
        ./build_kernel.sh
      working-directory: kernel_root
      
    - name: Upload AnyKernel3 ZIP
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-${{ inputs.BRANCH }}
        path: |
          kernel_root/result/ak/*

    - name: Upload Output
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Output
        path: | 
          kernel_root/out/arch/arm64/boot/*
