name: Build Kernel
on:
  workflow_dispatch:
    inputs:
      BRANCH:
        description: Kernel branch
        default: 'master'
        required: true
        
jobs:
  build:
    runs-on: ubuntu-22.04
    environment: build-kernel-${{ inputs.BRANCH }}
    steps:
    - name: Get date
      id: rundate
      run: sudo rm /etc/localtime && sudo ln -s /usr/share/zoneinfo/Asia/Jakarta /etc/localtime && echo "REPO_DATE=`date`" >> $GITHUB_OUTPUT
    
    - uses: actions/checkout@v4
      with:
        path: kernel_root
        repository: "rufnx/kernel_samsung_a226b"
        ref: ${{ inputs.BRANCH }}
        show-progress: false
        fetch-depth: 1
        
    - name: Prepare dependencies
      run: |
        sudo apt update -y
        sudo apt install bc cpio flex bison aptitude git python-is-python3 tar perl wget aria2 curl lz4 -y
        sudo aptitude install libssl-dev -y
        
    - name: Build Kernel
      run: |
        if [ ! -d "clang" ]; then
          curl -LSs https://raw.githubusercontent.com/rufnx/personal_patch/master/clang.sh | bash 12 clang
        else
          echo "clang found, skip fetching clang"
        fi

        if [ ! -d "gcc" ]; then
          curl -LSs https://raw.githubusercontent.com/rufnx/toolchains/README/clone.sh | bash androidcc-4.9 gcc
        else
          echo "gcc found, skip fetching gcc"
        fi
      working-directory: kernel_root
